name: Upload Real Dataset via Python
on:
  push:
    branches:
      - fix-missing-orc

permissions:
  contents: read
  id-token: write

jobs:
  upload-orc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_NAME }}
          service_account: ${{ secrets.GCP_WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas pyarrow "google-cloud-storage<3.0.0" google-cloud-bigquery db-dtypes

      - name: Create Script
        run: |
          cat << 'EOF' > script.py
          import pandas as pd
          import pyarrow as pa
          import pyarrow.orc as orc
          from google.cloud import storage
          from google.cloud import bigquery
          import sys
          import traceback

          print('Querying real dataset from BigQuery...')
          client_bq = bigquery.Client(project='tbd-2026l-321362')
          query = """
          SELECT word, sum(word_count) as sum_word_count 
          FROM `bigquery-public-data.samples.shakespeare` 
          WHERE word_count > 0 AND word NOT LIKE '%\'%' 
          GROUP BY word 
          ORDER BY sum_word_count DESC
          """

          try:
              df = client_bq.query(query).to_dataframe()
              print(f'Downloaded {len(df)} rows. Writing ORC...')
              table = pa.Table.from_pandas(df)
              orc.write_table(table, 'part-00000-real-c000.snappy.orc')
              
              print('Uploading to GCS...')
              client_storage = storage.Client()
              bucket = client_storage.bucket('tbd-2026l-321362-data')
              if not bucket.exists():
                  print('Bucket does not exist, creating...')
                  bucket = client_storage.create_bucket('tbd-2026l-321362-data', location='europe-west1')
              
              blob = bucket.blob('data/shakespeare/part-00000-real-c000.snappy.orc')
              blob.upload_from_filename('part-00000-real-c000.snappy.orc')
              print('Upload complete!')
          except Exception as e:
              print('Error:', e)
              traceback.print_exc()
              sys.exit(1)
          EOF

      - name: Run Script
        run: python script.py
